# =============================================================================
# lighttpd-docker.conf — Docker-specific configuration
# =============================================================================
# Same as lighttpd.conf but binds 0.0.0.0 so the port is reachable from
# the Docker host via port mapping. Used inside the Dockerfile.
# =============================================================================

# ── Server Identity (run as root in Docker for gcov .gcda writes) ─────────
# server.username / server.groupname commented out — gcov needs write access
# to the build tree which is owned by root inside the container.

# ── Network (0.0.0.0 for Docker port mapping) ──────────────────────────────
server.bind          = "0.0.0.0"
server.port          = 8080

# ── Process Model ────────────────────────────────────────────────────────────
server.max-worker    = 1
server.max-connections = 64
server.max-fds       = 128

# ── Timeouts (aggressive — crash detection must be fast) ─────────────────────
server.max-read-idle  = 5
server.max-write-idle = 5
server.max-keep-alive-idle = 2
server.max-keep-alive-requests = 10

# ── Logging (minimal) ───────────────────────────────────────────────────────
server.errorlog      = "/dev/stderr"
accesslog.filename   = ""
debug.log-request-handling = "disable"
debug.log-response-header  = "disable"
debug.log-request-header   = "disable"

# ── Document Root ────────────────────────────────────────────────────────────
server.document-root = "/tmp/lifa-lighttpd-docroot"

# ── Modules ──────────────────────────────────────────────────────────────────
server.modules = (
    "mod_access",
    "mod_accesslog",
)

# ── MIME Types (minimal) ───────────────────────────────────────────────────
mimetype.assign = (
    ".html" => "text/html",
    ".txt"  => "text/plain",
    ""      => "application/octet-stream",
)

# ── URL Access Rules ─────────────────────────────────────────────────────────
url.access-deny = ()

# ── Index Files ──────────────────────────────────────────────────────────────
index-file.names = ( "index.html" )
