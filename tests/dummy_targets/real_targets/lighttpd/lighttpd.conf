# =============================================================================
# lighttpd.conf — LIFA-Fuzz Fuzzing Target Configuration
# =============================================================================
# Optimized for fuzzing: minimal logging, low timeouts, single worker.
# Binds to localhost:8080 so the fuzzer's Interceptor can proxy to it.
#
# Usage:
#   lighttpd -D -f lighttpd.conf -m /usr/lib/lighttpd
#
# Coverage-instrumented build:
#   See scripts/prepare_lighttpd.sh
# =============================================================================

# ── Server Identity ──────────────────────────────────────────────────────────
server.username      = "nobody"
server.groupname     = "nogroup"

# ── Network ──────────────────────────────────────────────────────────────────
server.bind          = "127.0.0.1"
server.port          = 8080

# ── Process Model ────────────────────────────────────────────────────────────
# Single worker — deterministic, reproducible crash behavior.
# No forking so SIGSEGV kills the entire process (required for crash detection).
server.max-worker    = 1
server.max-connections = 64
server.max-fds       = 128

# ── Timeouts (aggressive — crash detection must be fast) ─────────────────────
server.max-read-idle  = 5      # seconds — read timeout per request
server.max-write-idle = 5      # seconds — write timeout per request
server.max-keep-alive-idle = 2 # seconds — keep-alive idle
server.max-keep-alive-requests = 10

# ── Logging (minimal — avoid I/O noise during fuzzing) ──────────────────────
# Only log to stderr for crash diagnostics; disable access log entirely.
server.errorlog      = "/dev/stderr"
accesslog.filename   = ""      # Disabled
debug.log-request-handling = "disable"
debug.log-response-header  = "disable"
debug.log-request-header   = "disable"

# ── Document Root ────────────────────────────────────────────────────────────
server.document-root = "/tmp/lifa-lighttpd-docroot"

# ── Modules ──────────────────────────────────────────────────────────────────
server.modules = (
    "mod_access",
    "mod_accesslog",
)

# ── MIME Types (minimal) ────────────────────────────────────────────────────
mimetype.assign = (
    ".html" => "text/html",
    ".txt"  => "text/plain",
    ""      => "application/octet-stream",
)

# ── URL Access Rules ─────────────────────────────────────────────────────────
# Allow all requests — the fuzzer needs full freedom to craft any HTTP request.
url.access-deny = ()

# ── Index Files ──────────────────────────────────────────────────────────────
index-file.names = ( "index.html" )

# ── Fuzzing Hints ────────────────────────────────────────────────────────────
# Known vulnerable versions to target (for the prepare script):
#   - lighttpd 1.4.45: CVE-2018-19052 (HTTP/2 request smuggling)
#   - lighttpd 1.4.55: CVE-2022-22707 (path traversal)
#   - lighttpd 1.4.64: use-after-free in HTTP/2 (h2 handling)
#
# For coverage-guided fuzzing, the fuzzer sends raw HTTP requests
# through the Interceptor which proxies to this server on port 8080.
