# =============================================================================
# LIFA-Fuzz Global Configuration
# =============================================================================
# All tunable parameters for the three-block architecture.
# Override individual values via environment variables (LIFA_{SECTION}_{KEY}).

# -----------------------------------------------------------------------------
# Sandbox (Block 1)
# -----------------------------------------------------------------------------
sandbox:
  driver: "docker"                # "docker" (Phase 1) or "firecracker" (Phase 4)
  server_image: "lifa-fuzz-server:latest"
  target_container: "lifa-target-server"
  network_name: "lifa-network"
  proxy_listen_port: 8001        # Port the interceptor listens on (client connects here)
  upstream_port: 9000             # Port the target server listens on inside the sandbox
  server_restart_delay: 2        # Seconds to wait before resetting crashed server

  # Client subprocess settings (runs locally on host, not in Docker)
  client:
    enabled: true
    script: "sandbox/client/client.py"
    target_host: "127.0.0.1"     # Connects to the Interceptor on the host
    target_port: 8001            # Interceptor's listen port
    send_interval_ms: 1000

  # Firecracker MicroVM settings (used when driver: "firecracker")
  firecracker:
    binary_path: "sandbox/firecracker_env/firecracker"
    vmlinux_path: "sandbox/firecracker_env/vmlinux"
    rootfs_path: "sandbox/firecracker_env/rootfs.ext4"
    snapshot_dir: "sandbox/firecracker_env/snapshots"
    kernel_args: "console=ttyS0 reboot=k panic=1 pci=off root=/dev/vda rw init=/bin/vulnerable_server ip=172.16.0.2::172.16.0.1:255.255.255.0::eth0:off"
    mem_size_mb: 512
    vcpu_count: 2
    tap_name: "tap-lifa0"
    host_ip: "172.16.0.1"         # Host-side IP on the TAP bridge
    vm_ip: "172.16.0.2"           # Static IP assigned to the VM
    socket_path: "/tmp/firecracker-lifa.sock"
    # Target name: "vulnerable_server" (default — LIFA v2 state-machine target),
    # "lightftp", or "lighttpd".
    # When "vulnerable_server": rootfs built from sandbox/target/vulnerable_server.c
    # (v2: 8-byte header, INIT→AUTH state machine, fork per-connection, ASAN).
    target_name: "vulnerable_server"
    # Rootfs path — must match the target. rootfs.ext4 for vulnerable_server.
    rootfs_path: "sandbox/firecracker_env/rootfs.ext4"

# -----------------------------------------------------------------------------
# Fast Loop (Block 2)
# -----------------------------------------------------------------------------
fast_loop:
  # ProtocolModule: "null" (DEFAULT — pure black-box core, no protocol
  # knowledge; the thesis) or a disclosed case-study module ("ftp"). Resolved
  # via shared/protocol_module.py registry. See docs refactor plan.
  protocol_module: "null"

  # Interceptor settings
  interceptor:
    host: "0.0.0.0"
    port: 8001
    max_connections: 100         # Max concurrent proxied connections
    connection_timeout: 30       # Seconds before dropping idle connections

  # Traffic log settings
  traffic_log:
    path: "shared/raw_traffic.jsonl"     # Traffic log path (must match evaluation_runner)
    max_size_mb: 100                   # Max log size before rotation (MB)
    flush_interval_ms: 100            # How often to flush to disk

  # Mutation engine settings
  mutator:
    mode: "smart"                # "random" (bit-flip only) or "smart" (rule-based)
    mutations_per_packet: 5      # Number of variants per captured packet
    max_packet_size: 65535       # Cap on mutated packet size
    rate_limit_eps: 500          # Max Executions Per Second (0 = unlimited)
    random_flip_ratio: 0.1       # Fraction of mutations that are pure random (vs rule-based)
    k: 2                         # Base number of fields to mutate per packet
    adaptive_k: true             # P2-A: k scales with sqrt(num_fields)
    use_weighted: true           # P2-B: strategy-priority weighted field selection
    investigation_budget: 500    # Total sends in ONE_AT_A_TIME mode before reverting
    budget_per_field: 0          # P2-D: 0 = adaptive (5s * EPS per field), >0 = fixed
    warmup_seconds: 30           # P3-A: ALL_FIELDS warm-up duration (0 = disabled)

  # EWMA Adaptive State Sampling — file-based IPC with Slow Loop
  adaptive_sampling:
    enabled: true              # Set false to use legacy no_recv behavior
    ipc_read_interval: 50      # Read adaptive_k.json every N packets
    k_default: 200             # Sampling interval when file not yet available
    adaptive_k_path: "shared/adaptive_k.json"
    response_buf_path: "shared/response_buffer.jsonl"

  # Sequence-aware fuzzing (M = ⟨Prefix, Target, Suffix⟩)
  sequence:
    mode: "auto"                 # "auto" (group by session_id) | "single" (legacy, no grouping)
    session_timeout: 2.0         # Seconds to wait before flushing a session buffer
    target_weight: "quadratic"   # Target index weighting: "quadratic" | "linear" | "uniform"

  # Crash monitor settings
  crash_monitor:
    poll_interval_ms: 500        # How often to check container status
    crash_corpus_dir: "./crashes" # Directory to save crash artifacts
    auto_restart: true           # Automatically restart crashed target

  # Rule watcher settings (receives rules from Slow Loop)
  rule_watcher:
    rules_file: "/tmp/lifa_rules.json"  # File watched for new rules
    poll_interval_ms: 2000            # How often to check for rule updates

# -----------------------------------------------------------------------------
# Slow Loop (Block 3)
# -----------------------------------------------------------------------------
slow_loop:
  # Traffic parser settings
  parser:
    read_interval_ms: 5000       # How often to read the traffic log
    max_samples_per_batch: 20   # Max traffic samples sent to LLM per inference
    min_samples_before_infer: 2 # Minimum samples before first LLM inference

  # LLM Agent settings
  llm_agent:
    mode: "REAL"                # "REAL" (calls actual API) or "MOCK" (simulated for testing)
    provider: "openai"          # litellm provider string (openai, anthropic, ollama)
    model: "glm-5-turbo"        # Model name (must be supported by litellm)
    api_key_env: "OPENAI_API_KEY"  # Environment variable holding the API key
    api_base: "https://api.z.ai/api/coding/paas/v4"  # Custom API endpoint (empty = provider default)
    enable_thinking: false      # Disable reasoning/thinking mode (Z.ai GLM needs this)
    extra_body: {}              # Extra JSON body params passed to the API (e.g. {"enable_thinking": false})
    max_tokens: 4096            # Max tokens for LLM response
    temperature: 0.2            # Low temperature for consistent inference
    timeout_seconds: 60         # Request timeout (glm-5-turbo needs ~15-20s with long prompts)
    max_retries: 3              # Retry count on API failure
    retry_backoff_ms: 5000      # Base retry backoff
    session_budget_tokens: 0    # Max tokens per session (0 = unlimited)
    session_budget_usd: 10.0    # Max $ spend per session (0 = unlimited)

    # Resilience settings
    cache_file: "shared/last_known_grammar.json"  # Persistent grammar cache (survives restarts)
    circuit_retry_after_s: 300                     # Circuit breaker cooldown (seconds)

    # Prompt validation
    context_window: 128000                         # Model context window in tokens
    prompt_truncation_strategy: "truncate"         # truncate | error

    # --- Multi-Provider Examples ---
    # Uncomment ONE block and comment out the defaults above.

    # Anthropic (Claude):
    #   provider: "anthropic"
    #   model: "claude-sonnet-4-6"
    #   api_key_env: "ANTHROPIC_API_KEY"
    #   api_base: ""

    # ZhipuAI (via OpenAI-compatible endpoint):
    #   provider: "openai"
    #   model: "glm-5-turbo"
    #   api_key_env: "ZHIPUAI_API_KEY"
    #   api_base: "https://api.z.ai/api/coding/paas/v4"

    # Ollama (local, no API key needed):
    #   provider: "ollama"
    #   model: "llama3.2"
    #   api_key_env: ""
    #   api_base: ""

  # Differential analyzer settings (mathematical pre-processing)
  differential_analyzer:
    max_depth: 64               # Maximum byte offset to analyze
    min_packets: 3              # Minimum packets for meaningful analysis
    min_coverage: 0.6           # Minimum coverage fraction per offset

  # Crash manager integration
  crash_manager:
    crash_dir: "./crashes"      # Directory for crash PoCs and reports

  # Rule generator settings
  rule_generator:
    min_confidence: 0.5         # Minimum LLM confidence to accept a rule
    max_rules: 200              # Max active rules (drop lowest priority if exceeded)
    rule_output_file: "/tmp/lifa_rules.json"  # Where to write generated rules

  # A/B mode for evaluation (offline only — "llm" is the default)
  ab_mode: "llm"               # llm | random | alternating

  # Time-based re-inference: force LLM inference even when no new unique
  # packets arrive. Prevents LLM starvation on protocols with few message
  # types (e.g., HTTP with only GET/POST/HEAD).
  re_infer_interval_s: 300     # Seconds between forced re-inferences (default: 5 min)

  # Phase 3 / TASK 4 — force-inference cadence. Hard OR-condition that fires an
  # LLM inference even when new-unique-packet count is low, breaking the
  # 14-inferences/4h starvation seen in the 8h campaign. Mutation count is read
  # cross-process from shared/runtime_state.json.
  force_inference:
    time_threshold_s: 600      # Force inference if >600s since last inference
    mutation_threshold: 20000  # Force inference if >20000 new mutations

  # EWMA Adaptive Controller — coordinates Fast Loop recv() sampling
  ewma_controller:
    enabled: true
    delta: 0.1                 # EWMA smoothing (0.05=slow adapt, 0.2=fast adapt)
    theta: 2.0                 # Sensitivity gain (2.0=moderate, 5.0=aggressive)
    K_max: 200                 # Max sampling interval (fire-and-forget ceiling)
    k_min: 5                   # Min sampling interval (never recv more than every 5 packets)
    weight_A: 0.3              # Weight for field_groups proxy metric (protocol discovery)
    weight_B: 0.7              # Weight for response diversity proxy metric
    output_path: "shared/adaptive_k.json"
    response_buf_path: "shared/response_buffer.jsonl"

# -----------------------------------------------------------------------------
# Shared / Global
# -----------------------------------------------------------------------------
global:
  log_level: "INFO"             # DEBUG | INFO | WARNING | ERROR
  log_format: "json"            # "json" (structured) or "text" (human-readable)
  log_file: "/tmp/lifa_fuzz.log" # Optional: also write logs to file (empty = stdout only)
