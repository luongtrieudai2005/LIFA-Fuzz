# =============================================================================
# LIFA-Fuzz — Docker Compose
# =============================================================================
# Services:
#   - target_server:  Vulnerable C server (the fuzz target)
#   - web_dashboard:  Streamlit monitoring UI
#
# The Interceptor, Mutator, CrashMonitor, and Client all run on the host
# via `python main.py`.
#
# Usage:
#   # Start target + dashboard:
#   docker compose -f sandbox/docker-compose.yml up --build -d
#
#   # Start fuzzer (host):
#   LLM_MODE=MOCK python main.py
#
#   # Dashboard: http://localhost:8501
#   # Stop:
#   docker compose -f sandbox/docker-compose.yml down
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Vulnerable Target Server — C binary with LIFA protocol + stack overflow
  # Built from sandbox/target/Dockerfile (compiles vulnerable_server.c)
  # Access: localhost:9000
  # ---------------------------------------------------------------------------
  target_server:
    build:
      context: ./target
      dockerfile: Dockerfile
    container_name: lifa-target-server
    restart: unless-stopped
    ports:
      - "9000:9000"
    networks:
      - lifa-network
    healthcheck:
      test: ["CMD-SHELL", "echo 'health' | nc -w 1 localhost 9000 || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Web Dashboard — Streamlit real-time monitoring UI
  # Reads host's shared/ and crashes/ via bind mounts for live metrics.
  # Access: http://localhost:8501
  # ---------------------------------------------------------------------------
  web_dashboard:
    build:
      context: ../web_ui
      dockerfile: Dockerfile
    container_name: lifa-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ../shared:/app/shared:ro        # Bind-mount host shared/ (read-only)
      - ../crashes:/app/crashes:ro      # Bind-mount host crashes/ (read-only)
    environment:
      - LIFA_DATA_DIR=/app
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  lifa-network:
    driver: bridge
